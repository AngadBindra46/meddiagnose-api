apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: meddiagnose-api
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: meddiagnose-api@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/meddiagnose/meddiagnose-api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: DEBUG
              value: "false"
            - name: LOG_FORMAT
              value: json
            - name: USE_REDIS_FOR_LIMITER
              value: "true"
            - name: STORAGE_BACKEND
              value: gcs
            # Secrets from Secret Manager
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: meddiagnose-database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: meddiagnose-redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: meddiagnose-secret-key
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: meddiagnose-gcp-project-id
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
